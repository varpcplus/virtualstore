<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            background: #050505; 
            color: #f8fafc; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* Бесконечный фон сетка */
        .grid-bg { 
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
            animation: gridScroll 8s linear infinite;
        }

        @keyframes gridScroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .glow-bg {
            position: fixed;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.12) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 6s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .view {
            position: fixed;
            inset: 0;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
            background: transparent;
        }

        .view.active {
            opacity: 1;
            pointer-events: all;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(255, 107, 157, 0.1);
            border-radius: 50px;
            border: 1px solid rgba(255, 107, 157, 0.2);
            font-weight: 600;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(196,69,105,0.2));
            border: 1px solid rgba(255,107,157,0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease 0.1s both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .balance-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 107, 157, 0.2);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 800;
            color: #ff6b9d;
        }

        .tabs-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            margin-bottom: 20px;
            animation: slideUp 0.5s ease 0.2s both;
        }

        .tabs-wrapper::-webkit-scrollbar {
            display: none;
        }

        .tab-container {
            display: flex;
            gap: 8px;
            padding: 4px;
            width: max-content;
            min-width: 100%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category-tab {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-size: 13px;
            flex-shrink: 0;
        }

        .category-tab:hover {
            background: rgba(255, 107, 157, 0.1);
            border-color: rgba(255, 107, 157, 0.3);
            transform: translateY(-2px);
        }

        .category-tab.active {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            border-color: transparent;
        }

        .product-card {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease both;
        }

        .product-card:hover {
            border-color: #ff6b9d;
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(255, 107, 157, 0.15);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .buy-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-top: 12px;
        }

        .buy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
        }

        .price-tag {
            font-size: 20px;
            font-weight: 700;
            color: #ff6b9d;
        }

        .price-option {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(255, 107, 157, 0.1);
            border: 1px solid rgba(255, 107, 157, 0.2);
            border-radius: 8px;
            font-size: 12px;
            color: #ff6b9d;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .video-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ff6b9d;
            font-size: 12px;
            text-decoration: none;
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        .video-link:hover {
            background: rgba(255, 107, 157, 0.1);
            transform: translateX(5px);
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.15s; }
        .product-card:nth-child(3) { animation-delay: 0.2s; }
        .product-card:nth-child(4) { animation-delay: 0.25s; }
        .product-card:nth-child(5) { animation-delay: 0.3s; }
        .product-card:nth-child(6) { animation-delay: 0.35s; }
        .product-card:nth-child(7) { animation-delay: 0.4s; }

        .tg-avatar {
            animation: avatarPulse 2s infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 157, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255, 107, 157, 0); }
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 12px;
            padding: 16px 24px;
            z-index: 200;
            transition: transform 0.3s ease;
            max-width: 90%;
            text-align: center;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .notification.success {
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .notification.error {
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .bot-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 12px;
            transition: all 0.3s ease;
        }

        .bot-link-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="grid-bg"></div>

    <div id="notification" class="notification"></div>

    <!-- Main Shop View -->
    <div id="shopView" class="view active">
        <div class="relative z-10 max-w-md mx-auto p-4">
            <div class="text-center mb-4">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-pink-400 to-pink-600 bg-clip-text text-transparent">Virtual Store</h1>
            </div>

            <div class="flex justify-center mb-4">
                <div class="user-badge">
                    <div id="userAvatar" class="tg-avatar w-8 h-8 rounded-full bg-gradient-to-br from-pink-400 to-pink-600 flex items-center justify-center font-bold text-sm">?</div>
                    <div id="displayName" class="text-sm">user$</div>
                </div>
            </div>

            <!-- Balance Card -->
            <div class="balance-card">
                <div class="text-sm text-gray-400 mb-1">Ваш баланс</div>
                <div class="balance-amount" id="balanceAmount">0 ₽</div>
                <p class="text-xs text-gray-500 mt-2">Для покупки напишите боту @virtualgucci_bot</p>
                <a href="https://t.me/virtualgucci_bot" target="_blank" class="bot-link-btn">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                    Открыть бота
                </a>
            </div>

            <!-- Tabs -->
            <div class="tabs-wrapper">
                <div class="tab-container">
                    <button class="category-tab active" onclick="switchCategory('all', this)">Все товары</button>
                    <button class="category-tab" onclick="switchCategory('triggerbot', this)">Триггербот</button>
                    <button class="category-tab" onclick="switchCategory('scripts', this)">Скрипты</button>
                    <button class="category-tab" onclick="switchCategory('redux', this)">Редуксы</button>
                    <button class="category-tab" onclick="switchCategory('packs', this)">Паки</button>
                    <button class="category-tab" onclick="switchCategory('utility', this)">Утилиты</button>
                </div>
            </div>

            <div id="productsGrid"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let currentUser = null;
        let currentCategory = 'all';

        const products = [
            { id: 'nagruz', name: 'Нагруз', category: 'scripts', price: 370, video: 'https://www.tiktok.com/t/ZThv9Vhnq/' },
            { id: 'antitp', name: 'Анти-ТП', category: 'scripts', price: 370 },
            { id: 'rega', name: 'Рега', category: 'scripts', price: 370, video: 'https://www.tiktok.com/t/ZThv9Vhnq/' },
            { 
                id: 'triggerbot', 
                name: 'Триггербот', 
                category: 'triggerbot', 
                video: 'https://youtu.be/lxwfcZS4Ey8',
                prices: [
                    { label: '7 дней', price: 300 },
                    { label: '14 дней', price: 400 },
                    { label: '30 дней', price: 700 },
                    { label: 'Навсегда', price: 2500 }
                ]
            },
            { id: 'pack', name: 'Пак (Нагруз + Анти-ТП + Рега)', category: 'packs', price: 570, video: 'https://youtu.be/YzmVadod_qg' },
            { id: 'cleaner', name: 'Батники для очистки читов', category: 'utility', price: 370, video: 'https://youtu.be/Fozc1P_tUPk' },
            { id: 'hide', name: 'Прятка чита (все виды)', category: 'utility', price: 444 },
            { id: 'fastreload', name: 'Фаст Релоад Редукс', category: 'redux', price: 370, video: 'https://youtu.be/35bH6DZP-i0' }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            tg.ready();
            tg.expand();
            
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = tg.initDataUnsafe.user;
            } else {
                currentUser = { id: 0, first_name: 'user$', username: 'user$' };
            }
            
            initApp();
        });

        function initApp() {
            const displayName = currentUser.first_name || 'user$';
            const avatarLetter = (currentUser.first_name || 'U').charAt(0).toUpperCase();
            
            document.getElementById('displayName').textContent = displayName;
            document.getElementById('userAvatar').textContent = avatarLetter;
            
            renderProducts();
        }

        function switchCategory(category, btn) {
            currentCategory = category;
            
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            btn.classList.add('active');
            
            const grid = document.getElementById('productsGrid');
            grid.style.opacity = '0';
            
            setTimeout(() => {
                renderProducts();
                grid.style.transition = 'opacity 0.3s ease';
                grid.style.opacity = '1';
            }, 200);
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            const filtered = currentCategory === 'all' 
                ? products 
                : products.filter(p => p.category === currentCategory);
            
            filtered.forEach((product, index) => {
                setTimeout(() => {
                    grid.appendChild(createProductCard(product));
                }, index * 50);
            });
        }

        function createProductCard(product) {
            const div = document.createElement('div');
            div.className = 'product-card';
            
            let priceHtml = '';
            
            if (product.prices) {
                priceHtml = '<div class="mt-2 flex flex-wrap">';
                product.prices.forEach((p) => {
                    priceHtml += `<span class="price-option">${p.label}: ${p.price}₽</span>`;
                });
                priceHtml += '</div>';
            } else {
                priceHtml = `<div class="price-tag mt-1">${product.price} ₽</div>`;
            }

            let videoHtml = product.video ? `<a href="${product.video}" target="_blank" class="video-link" onclick="event.stopPropagation()"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Видео</a>` : '';
            
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <h3 class="text-base font-bold">${product.name}</h3>
                </div>
                ${priceHtml}
                ${videoHtml}
                <button class="buy-btn" onclick="openBot()">Купить в боте</button>
            `;
            
            return div;
        }

        function openBot() {
            tg.openTelegramLink('https://t.me/virtualgucci_bot');
        }

        function showNotification(text, type) {
            const notif = document.getElementById('notification');
            notif.textContent = text;
            notif.className = `notification ${type}`;
            notif.classList.add('show');
            
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
